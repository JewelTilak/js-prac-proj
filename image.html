<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Image Display</title>
    <style>
        img { display: block; margin-top: 10px; max-width: 300px; height: auto; }
    </style>
</head>
<body>
    <button onmouseover="imgA()">Image 1</button>
    <button onmouseover="imgB()">Image 2</button>
    <button onmouseover="imgC()">Image 3</button>
    <button onmouseover="imgD()">Image 4</button>

    <img id="displayArea" src="" alt="Hover over a button to display an image">

    <script>
        function imgA() {
        
            document.getElementById('displayArea').src = 'flower.png';
        }
        function imgB() {
            document.getElementById('displayArea').src = 'https://picsum.photos/seed/b/300/200';
        }
        function imgC() {
            document.getElementById('displayArea').src = 'https://picsum.photos/seed/c/300/200';
        }
        function imgD() {
            document.getElementById('displayArea').src = 'https://picsum.photos/seed/d/300/200';
        }
    </script>
</body>
</html>
